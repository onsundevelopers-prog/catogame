<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Password Game Clone</title>
    <style>
        :root {
            --error-bg: #ffefef;
            --error-border: #ff8080;
            --error-text: #690000;
            --success-bg: #f2ffef;
            --success-border: #80ff8b;
            --success-text: #004d08;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 40px;
            text-align: center;
        }

        .password-box {
            width: 100%;
            position: sticky;
            top: 20px;
            z-index: 100;
            background: white;
            padding-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 18px;
            display: block;
            margin-bottom: 10px;
        }

        #password-input {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            font-size: 24px;
            border: 2px solid #000;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
        }

        .char-count {
            text-align: right;
            margin-top: 5px;
            color: #666;
        }

        #rules-container {
            display: flex;
            flex-direction: column-reverse; /* Newest rules on top */
            gap: 20px;
            margin-top: 20px;
        }

        .rule-card {
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #000;
            transition: all 0.3s ease;
            position: relative;
        }

        .rule-card.fail {
            background-color: var(--error-bg);
            border-color: var(--error-border);
            color: var(--error-text);
        }

        .rule-card.success {
            background-color: var(--success-bg);
            border-color: var(--success-border);
            color: var(--success-text);
        }

        .rule-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .rule-title svg {
            margin-right: 10px;
        }

        .captcha-img {
            background: #eee;
            padding: 10px;
            letter-spacing: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-style: italic;
            display: inline-block;
            margin-top: 10px;
            text-decoration: line-through;
            user-select: none;
        }

        .sponsor-logos {
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Password Game</h1>

        <div class="password-box">
            <label>Please choose a password</label>
            <textarea id="password-input" spellcheck="false"></textarea>
            <div class="char-count" id="char-count">Character count: 0</div>
        </div>

        <div id="rules-container">
            <!-- Rules will be injected here -->
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password-input');
        const rulesContainer = document.getElementById('rules-container');
        const charCountDisplay = document.getElementById('char-count');

        let unlockedRules = 1;
        const captchaValue = Math.random().toString(36).substring(2, 7).toUpperCase();

        const RULES = [
            {
                id: 1,
                desc: "Your password must be at least 5 characters.",
                check: (pw) => pw.length >= 5
            },
            {
                id: 2,
                desc: "Your password must include a number.",
                check: (pw) => /\d/.test(pw)
            },
            {
                id: 3,
                desc: "Your password must include an uppercase letter.",
                check: (pw) => /[A-Z]/.test(pw)
            },
            {
                id: 4,
                desc: "Your password must include a special character.",
                check: (pw) => /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw)
            },
            {
                id: 5,
                desc: "The digits in your password must add up to 25.",
                check: (pw) => {
                    const digits = pw.match(/\d/g) || [];
                    const sum = digits.reduce((a, b) => a + parseInt(b), 0);
                    return sum === 25;
                }
            },
            {
                id: 6,
                desc: "Your password must include a month of the year.",
                check: (pw) => {
                    const months = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];
                    return months.some(m => pw.toLowerCase().includes(m));
                }
            },
            {
                id: 7,
                desc: "Your password must include a Roman numeral.",
                check: (pw) => /[IVXLCDM]/.test(pw)
            },
            {
                id: 8,
                desc: "Your password must include one of our sponsors: <span class='sponsor-logos'>Pepsi, Starbucks, Shell</span>",
                check: (pw) => ["pepsi", "starbucks", "shell"].some(s => pw.toLowerCase().includes(s))
            },
            {
                id: 9,
                desc: "The Roman numerals in your password should multiply to 35.",
                check: (pw) => {
                    const romanValues = { 'I': 1, 'V': 5, 'X': 10, 'L': 50, 'C': 100, 'D': 500, 'M': 1000 };
                    // Very simplified Roman numeral extraction for the game feel
                    const found = pw.match(/[IVXLCDM]+/g) || [];
                    let product = found.length > 0 ? 1 : 0;
                    
                    // This is a simplified check: it looks for 'V' and 'VII' etc as blocks
                    // To get 35, users usually type 'V' and 'VII'
                    found.forEach(str => {
                        let val = 0;
                        for(let i=0; i<str.length; i++) {
                            const cur = romanValues[str[i]];
                            const next = romanValues[str[i+1]];
                            if (next > cur) { val -= cur; } else { val += cur; }
                        }
                        product *= val;
                    });
                    return product === 35;
                }
            },
            {
                id: 10,
                desc: `Your password must include this CAPTCHA: <div class="captcha-img">${captchaValue}</div>`,
                check: (pw) => pw.includes(captchaValue)
            }
        ];

        function updateGame() {
            const pw = passwordInput.value;
            charCountDisplay.innerText = `Character count: ${pw.length}`;
            
            // Check all currently unlocked rules
            let allCurrentSatisfied = true;
            for (let i = 0; i < unlockedRules; i++) {
                if (!RULES[i].check(pw)) {
                    allCurrentSatisfied = false;
                }
            }

            // If all are satisfied, unlock the next rule
            if (allCurrentSatisfied && unlockedRules < RULES.length) {
                unlockedRules++;
            }

            renderRules(pw);
        }

        function renderRules(pw) {
            rulesContainer.innerHTML = '';
            
            for (let i = 0; i < unlockedRules; i++) {
                const rule = RULES[i];
                const isPassed = rule.check(pw);
                
                const card = document.createElement('div');
                card.className = `rule-card ${isPassed ? 'success' : 'fail'}`;
                
                const icon = isPassed ? 
                    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>` : 
                    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

                card.innerHTML = `
                    <div class="rule-title">
                        ${icon} Rule ${rule.id}
                    </div>
                    <div class="rule-desc">${rule.desc}</div>
                `;
                
                rulesContainer.appendChild(card);
            }
        }

        passwordInput.addEventListener('input', updateGame);

        // Initial render
        renderRules("");
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Homework Game</title>
    <style>
        :root {
            --error-bg: #fff1f2;
            --error-border: #ff8080;
            --error-text: #000;
            --success-bg: #f2ffef;
            --success-border: #80ff8b;
            --success-text: #000;
            --bg-color: #fefaf1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 500;
        }

        .level-indicator {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .password-box {
            width: 100%;
            position: sticky;
            top: 20px;
            z-index: 100;
            background: var(--bg-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        label {
            font-size: 16px;
            display: block;
            margin-bottom: 12px;
            color: #000;
        }

        #homework-input {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            font-size: 24px;
            border: 1px solid #999;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            resize: vertical;
            font-family: monospace;
            background-color: white;
            transition: border-color 0.2s;
        }

        #homework-input:focus {
            border-color: #000;
        }

        .stats {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        #rules-container {
            display: flex;
            flex-direction: column-reverse;
            gap: 15px;
            margin-top: 20px;
        }

        .rule-card {
            padding: 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            overflow: hidden;
            background: white;
        }

        .rule-card.fail {
            border-color: #ff8080;
        }

        .rule-card.success {
            border-color: #80ff8b;
        }

        .rule-header {
            padding: 8px 15px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid transparent;
        }

        .fail .rule-header {
            background: #ffefef;
            color: #ef4444;
            border-color: #ff8080;
        }

        .success .rule-header {
            background: #f2ffef;
            color: #22c55e;
            border-color: #80ff8b;
        }

        .rule-desc {
            padding: 15px;
            font-size: 16px;
            line-height: 1.4;
        }

        /* Distraction Styles */
        .distraction-popup {
            position: fixed;
            z-index: 1000;
            background: white;
            border: 1px solid #000;
            width: 280px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .distraction-header {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .distraction-body {
            padding: 15px;
            font-size: 14px;
        }

        /* Teacher Overlay */
        #teacher-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .teacher-msg {
            color: #ef4444;
            font-weight: 800;
            font-size: 48px;
            text-transform: uppercase;
        }

        .win-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .win-btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: 1px solid #000;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    

    <div id="teacher-overlay">
        <div class="teacher-msg">EYES ON ME!</div>
    </div>

    <div id="win-screen" class="win-screen">
        <h1 style="font-size: 100px; margin-bottom: 0;">A+</h1>
        <p style="font-weight: bold; font-size: 24px;">Homework Completed</p>
        <button class="win-btn" onclick="location.reload()">Reset</button>
    </div>

    <div class="container">
        <h1>* The Homework Game</h1>
        <div class="level-indicator" id="level-display">Rule 1</div>

        <div class="password-box">
            <label>Please complete your homework</label>
            <textarea id="homework-input" spellcheck="false" placeholder=""></textarea>
            <div class="stats">
                <span id="char-count">0</span>
            </div>
        </div>

        <div id="rules-container"></div>
    </div>

    <script>
        const input = document.getElementById('homework-input');
        const rulesContainer = document.getElementById('rules-container');
        const charCountDisplay = document.getElementById('char-count');
        const wordCountDisplay = document.getElementById('word-count');
        const progressBar = document.getElementById('progress-bar');
        const levelDisplay = document.getElementById('level-display');
        const teacherOverlay = document.getElementById('teacher-overlay');
        const winScreen = document.getElementById('win-screen');

        let unlockedRules = 1;
        let isTeacherWatching = false;

        const RULES = [
            { id: 1, desc: "Your essay must be at least 10 characters long.", check: (t) => t.length >= 10 },
            { id: 2, desc: "Include the word 'homework'.", check: (t) => t.toLowerCase().includes('homework') },
            { id: 3, desc: "The digits in your answer must add up to 15.", check: (t) => (t.match(/\d/g) || []).reduce((a, b) => a + parseInt(b), 0) === 15 },
            { id: 4, desc: "Include today's day of the week.", check: (t) => t.toLowerCase().includes(new Date().toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase()) },
            { id: 5, desc: "Include the symbol for 'Pi' (π) or its first 3 digits.", check: (t) => t.includes('π') || t.includes('3.14') },
            { id: 6, desc: "Include a school subject (Math, Science, History, etc.).", check: (t) => ["math", "science", "history", "english", "physics", "chemistry", "art"].some(s => t.toLowerCase().includes(s)) },
            { id: 7, desc: "Must contain a Roman Numeral between V and X.", check: (t) => /[V|VI|VII|VIII|IX|X]/.test(t) },
            { id: 8, desc: "Include a color that is not 'blue'.", check: (t) => ["red", "green", "yellow", "purple", "orange", "black", "pink"].some(c => t.toLowerCase().includes(c)) },
            { id: 9, desc: "Must include a chemical element symbol (He, Li, B...).", check: (t) => ["He", "Li", "Be", "Ne", "Na", "Mg", "Al", "Si", "Cl", "Ar", "Ca"].some(e => t.includes(e)) },
            { id: 10, desc: "Include the name of a Greek god.", check: (t) => ["zeus", "hera", "poseidon", "demeter", "athena", "apollo", "ares", "aphrodite"].some(g => t.toLowerCase().includes(g)) },
            
            { id: 11, desc: "Must have at least one emoji.", check: (t) => /\p{Emoji}/u.test(t) },
            { id: 12, desc: "The word 'impossible' must be written in ALL CAPS.", check: (t) => t.includes('IMPOSSIBLE') },
            { id: 13, desc: "Your essay must not contain any consecutive spaces.", check: (t) => !/\s\s/.test(t) },
            { id: 14, desc: "Include a prime number greater than 10.", check: (t) => [11, 13, 17, 19, 23, 29, 31, 37, 41].some(p => t.includes(p.toString())) },
            { id: 15, desc: "Include a programming language name.", check: (t) => ["python", "javascript", "java", "ruby", "rust"].some(l => t.toLowerCase().includes(l)) },
            { id: 16, desc: "Length must be exactly a multiple of 7.", check: (t) => t.length > 0 && t.length % 7 === 0 },
            { id: 17, desc: "Include the name of an ocean.", check: (t) => ["pacific", "atlantic", "indian", "arctic"].some(o => t.toLowerCase().includes(o)) },
            { id: 18, desc: "Include a month that ends in 'r'.", check: (t) => ["september", "october", "november", "december"].some(m => t.toLowerCase().includes(m)) },
            { id: 19, desc: "Must include a mathematical operator (+, -, *, /).", check: (t) => /[+\-*/]/.test(t) },
            { id: 20, desc: "Add 'TRANSCRIPT' to the beginning.", check: (t) => t.startsWith('TRANSCRIPT') },

            { id: 21, desc: "Include at least 3 punctuation marks.", check: (t) => (t.match(/[.,!?;:]/g) || []).length >= 3 },
            { id: 22, desc: "Include the name of a planet.", check: (t) => ["mercury", "venus", "earth", "mars", "jupiter", "saturn", "uranus", "neptune"].some(p => t.toLowerCase().includes(p)) },
            { id: 23, desc: "Do not use the letter 'e' for the last 10 characters.", check: (t) => !t.slice(-10).toLowerCase().includes('e') },
            { id: 24, desc: "Include a chess piece name.", check: (t) => ["king", "queen", "rook", "bishop", "knight", "pawn"].some(p => t.toLowerCase().includes(p)) },
            { id: 25, desc: "Sum of letters must be even.", check: (t) => (t.match(/[a-z]/gi) || []).length % 2 === 0 },
            { id: 26, desc: "Include a type of fruit.", check: (t) => ["apple", "banana", "orange", "grape", "mango"].some(f => t.toLowerCase().includes(f)) },
            { id: 27, desc: "Include a currency symbol ($, €, £, ¥).", check: (t) => /[$,€,£,¥]/.test(t) },
            { id: 28, desc: "Must contain exactly two digits next to each other.", check: (t) => /\d{2}/.test(t) && !/\d{3}/.test(t) },
            { id: 29, desc: "Include the word 'PENCIL' backwards.", check: (t) => t.includes('LICNEP') },
            { id: 30, desc: "Include a palindrome of at least 3 letters.", check: (t) => {
                const words = t.toLowerCase().match(/[a-z]{3,}/g) || [];
                return words.some(w => w === w.split('').reverse().join(''));
            }},

            { id: 31, desc: "The essay must be at least 150 characters long.", check: (t) => t.length >= 150 },
            { id: 32, desc: "Include a word that rhymes with 'school'.", check: (t) => ["pool", "cool", "tool", "fool", "rule"].some(w => t.toLowerCase().includes(w)) },
            { id: 33, desc: "Every word starting with 'T' must be capitalized.", check: (t) => {
                const words = t.split(/\s+/);
                return words.filter(w => w.toLowerCase().startsWith('t')).every(w => /^[T]/.test(w));
            }},
            { id: 34, desc: "Include a valid hex color code (e.g. #FF5733).", check: (t) => /#[0-9a-fA-F]{6}|#[0-9a-fA-F]{3}/.test(t) },
            { id: 35, desc: "Include an animal that starts with 'Z'.", check: (t) => ["zebra", "zebu"].some(z => t.toLowerCase().includes(z)) },
            { id: 36, desc: "Number of digits must equal number of vowels.", check: (t) => {
                const digits = (t.match(/\d/g) || []).length;
                const vowels = (t.match(/[aeiou]/gi) || []).length;
                return digits === vowels && digits > 0;
            }},
            { id: 37, desc: "Include the current year.", check: (t) => t.includes(new Date().getFullYear().toString()) },
            { id: 38, desc: "Include the word '**EDUCATION**'.", check: (t) => t.includes('**EDUCATION**') },
            { id: 39, desc: "The word 'GRADUATE' must be the very last word.", check: (t) => t.trim().toLowerCase().endsWith('graduate') },
            { id: 40, desc: "The letter 'X' must appear exactly 3 times.", check: (t) => (t.match(/x/gi) || []).length === 3 },
            
            { id: 41, desc: "Include 'CONSTITUTION' and make it the longest word.", check: (t) => {
                if (!t.toLowerCase().includes('constitution')) return false;
                const words = t.match(/\b\w+\b/g) || [];
                const maxLen = Math.max(...words.map(w => w.length));
                return 'constitution'.length === maxLen;
            }},
            { id: 42, desc: "Include a CSS rule (e.g. color: red;).", check: (t) => /[a-zA-Z-]+\s*:\s*[^;]+;/.test(t) },
            { id: 43, desc: "First and last character must be the same.", check: (t) => t.length > 1 && t[0].toLowerCase() === t[t.length - 1].toLowerCase() },
            { id: 44, desc: "Include the name of a famous scientist.", check: (t) => ["einstein", "newton", "curie", "tesla", "darwin"].some(s => t.toLowerCase().includes(s)) },
            { id: 45, desc: "Must not contain the word 'the'.", check: (t) => !/\bthe\b/i.test(t) },
            { id: 46, desc: "Contain at least 5 different emojis.", check: (t) => new Set(t.match(/\p{Emoji}/gu) || []).size >= 5 },
            { id: 47, desc: "Include a link to 'google.com'.", check: (t) => t.includes('google.com') },
            { id: 48, desc: "Every sentence must end with a '!' mark.", check: (t) => {
                const sentences = t.trim().split(/[.!?]/).filter(s => s.trim().length > 0);
                return sentences.length > 0 && t.trim().endsWith('!');
            }},
            { id: 49, desc: "Must contain exactly 50 words.", check: (t) => (t.match(/\b\w+\b/g) || []).length === 50 },
            { id: 50, desc: "YOUR ASSIGNMENT IS COMPLETE. SUBMIT NOW.", check: (t) => true }
        ];

        function createDistraction() {
            if (unlockedRules < 15) return;
            const popup = document.createElement('div');
            popup.className = 'distraction-popup';
            popup.style.left = Math.random() * (window.innerWidth - 300) + 'px';
            popup.style.top = Math.random() * (window.innerHeight - 200) + 'px';
            
            popup.innerHTML = `
                <div class="distraction-header">
                    <span>Friend is calling...</span>
                    <span class="close-btn" onclick="this.parentElement.parentElement.remove()">✕</span>
                </div>
                <div class="distraction-body">
                    "Hey! I found this new game we should play instead of studying."
                </div>
            `;
            document.body.appendChild(popup);
        }

        function teacherWatch() {
            if (unlockedRules < 25) return;
            teacherOverlay.style.display = 'flex';
            isTeacherWatching = true;
            setTimeout(() => {
                teacherOverlay.style.display = 'none';
                isTeacherWatching = false;
            }, 3000);
        }

        function updateGame() {
            const val = input.value;
            charCountDisplay.innerText = val.length;

            let allCurrentSatisfied = true;
            for (let i = 0; i < unlockedRules; i++) {
                if (!RULES[i].check(val)) {
                    allCurrentSatisfied = false;
                }
            }

            if (allCurrentSatisfied && unlockedRules < RULES.length) {
                unlockedRules++;
                levelDisplay.innerText = `Rule ${unlockedRules}`;
            }

            if (unlockedRules === RULES.length && allCurrentSatisfied) {
                winScreen.style.display = 'flex';
            }

            renderRules(val);
        }

        function renderRules(val) {
            rulesContainer.innerHTML = '';
            for (let i = 0; i < unlockedRules; i++) {
                const rule = RULES[i];
                const passed = rule.check(val);
                const card = document.createElement('div');
                card.className = `rule-card ${passed ? 'success' : 'fail'}`;
                
                const icon = passed ? '✓' : '✕';
                
                card.innerHTML = `
                    <div class="rule-header">
                        <span>${icon} Rule ${rule.id}</span>
                    </div>
                    <div class="rule-desc">${rule.desc}</div>
                `;
                rulesContainer.appendChild(card);
            }
        }

        // Mechanics timers
        setInterval(createDistraction, 8000);
        setInterval(teacherWatch, 15000);

        input.addEventListener('input', updateGame);
        renderRules("");
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Impact Engine v2.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@900&display=swap');
        
        :root {
            --neon-red: #ff3e3e;
            --terminal-bg: #0a0a0c;
            --panel-bg: #141417;
            --border: 1px solid #333;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--terminal-bg); color: #e0e0e0;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- LAYOUT STRUCTURE --- */
        #main-container { 
            display: grid; 
            grid-template-columns: 400px 1fr 300px; 
            height: 100vh; 
        }

        /* --- MOBILE LAYOUT --- */
        @media (max-width: 900px) {
            #main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 300px auto;
                height: auto;
                overflow-y: auto;
            }

            #map-viewport {
                height: 300px;
                grid-row: 2;
            }

            #log-console {
                grid-column: 1;
                grid-row: 3;
                max-height: 200px;
                border-left: none;
                border-top: var(--border);
            }

            .sidebar {
                border-right: none;
                border-bottom: var(--border);
            }

            #canvas-3d {
                height: 160px;
            }

            .btn-main {
                clip-path: none;
                border-radius: 8px;
            }

            body, html { overflow-y: auto; }
        }

        /* --- SIDEBARS --- */
        .sidebar { 
            background: var(--panel-bg); 
            border-right: var(--border); 
            display: flex; 
            flex-direction: column;
            z-index: 10;
        }

        #log-console {
            grid-column: 3;
            border-left: var(--border);
            background: #000;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 10px;
            overflow-y: auto;
            color: #00ff41;
        }

        /* --- UI COMPONENTS --- */
        .header { padding: 20px; border-bottom: var(--border); }
        .header h1 { font-size: 18px; margin: 0; letter-spacing: 2px; color: var(--neon-red); }

        .control-block { padding: 20px; border-bottom: var(--border); }
        .control-block label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; color: #888; }
        
        input[type="range"] { width: 100%; accent-color: var(--neon-red); cursor: crosshair; }

        .btn-main {
            margin: 20px;
            padding: 20px;
            background: none;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            clip-path: polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%);
        }

        .btn-main:hover { background: var(--neon-red); color: #000; box-shadow: 0 0 20px rgba(255, 62, 62, 0.4); }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }

        #map-viewport { position: relative; background: #000; }
        #map { width: 100%; height: 100%; filter: brightness(0.6) contrast(1.2) invert(100%) hue-rotate(180deg); }

        /* --- 3D CANVAS --- */
        #canvas-3d { height: 250px; background: radial-gradient(circle, #1a1a1f 0%, #000 100%); }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .stat-box { background: #1a1a1f; padding: 10px; border: var(--border); }
        .stat-box label { font-size: 9px; color: #666; display: block; }
        .stat-box span { font-size: 16px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<div id="main-container">
    <!-- LEFT CONTROL PANEL -->
    <div class="sidebar">
        <div class="header"><h1>IMPACT ENGINE v2.0</h1></div>
        <div id="canvas-3d"></div>
        
        <div class="control-block">
            <label>Warhead Yield: <span id="yield-out">15</span> MT</label>
            <input type="range" id="param-yield" min="0.1" max="100" step="0.1" value="15">
        </div>

        <div class="control-block">
            <label>Burst Altitude: <span id="alt-out">Surface</span></label>
            <input type="range" id="param-alt" min="0" max="5000" step="100" value="0">
        </div>

        <div class="stat-grid">
            <div class="stat-box"><label>LATITUDE</label><span id="lat-val">0.00</span></div>
            <div class="stat-box"><label>LONGITUDE</label><span id="lng-val">0.00</span></div>
        </div>

        <button id="launch-trigger" class="btn-main" disabled>CORE LOADING...</button>
    </div>

    <!-- CENTER MAP AREA -->
    <div id="map-viewport">
        <div id="map"></div>
    </div>

    <!-- RIGHT LOG TERMINAL -->
    <div id="log-console">
        <div>[ SYSTEM INITIALIZING ]</div>
    </div>
</div>

<script>
/**
 * ENGINE ARCHITECTURE
 * 1. WorldPop Async Poller: Handles long-running spatial queries.
 * 2. TensorFlow DeepNet: Multi-layer perceptron for fatality estimation.
 * 3. Three.js Visualizer: Procedural geometry for the projectile.
 */

const UI = {
    log: (msg) => {
        const div = document.createElement('div');
        div.innerText = `> ${new Date().toLocaleTimeString()}: ${msg}`;
        const console = document.getElementById('log-console');
        console.appendChild(div);
        console.scrollTop = console.scrollHeight;
    },
    updateVal: (id, val) => document.getElementById(id).innerText = val
};

// --- 1. THE BRAIN (TensorFlow.js) ---
let brain;
async function initDeepLearning() {
    UI.log("Training Neural Network...");
    brain = tf.sequential();
    // Complex architecture: 2 hidden layers with 16 neurons each
    brain.add(tf.layers.dense({units: 16, inputShape: [3], activation: 'relu'})); // Yield, Pop, Altitude
    brain.add(tf.layers.dropout({rate: 0.1}));
    brain.add(tf.layers.dense({units: 16, activation: 'relu'}));
    brain.add(tf.layers.dense({units: 1, activation: 'linear'}));
    
    brain.compile({optimizer: tf.train.adam(0.01), loss: 'meanSquaredError'});
    
    // Synthetic training data for urban/rural scenarios
    const train_xs = tf.tensor2d([
        [1, 1000, 0], [50, 100000, 500], [15, 20000, 0], [100, 1000000, 1000], [1, 0, 0]
    ]);
    const train_ys = tf.tensor2d([[150], [45000], [8000], [850000], [0]]);
    
    await brain.fit(train_xs, train_ys, {epochs: 35});
    UI.log("Neural Core Online.");
    document.getElementById('launch-trigger').disabled = false;
    document.getElementById('launch-trigger').innerText = "AUTHORIZE LAUNCH";
}

// --- 2. WORLDPOP API MANAGER (Async Lifecycle) ---
const WorldPop = {
    proxy: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    
    async fetchPopulation(lat, lng, radiusKm) {
        const offset = radiusKm / 111.32;
        const poly = [
            [lng - offset, lat + offset], [lng + offset, lat + offset],
            [lng + offset, lat - offset], [lng - offset, lat - offset],
            [lng - offset, lat + offset]
        ];

        const geojson = {
            "type": "FeatureCollection",
            "features": [{
                "type": "Feature",
                "geometry": {"type": "Polygon", "coordinates": [poly]}
            }]
        };

        try {
            UI.log("Dispatching Spatial Query...");
            // Initial Request
            const reqUrl = this.proxy(`https://api.worldpop.org/v1/services/stats?dataset=wpgppop&year=2020&runasync=true&geojson=${JSON.stringify(geojson)}`);
            const res = await fetch(reqUrl);
            const initialData = await res.json();

            if (initialData.status === "created") {
                UI.log(`Task Created: ${initialData.taskid}. Polling...`);
                return await this.pollTask(initialData.taskid);
            } else if (initialData.data) {
                return initialData.data.total_population;
            }
        } catch (e) {
            UI.log("API Interface Error. Simulating localized data.");
            return Math.random() * 50000;
        }
    },

    async pollTask(taskId) {
        let attempts = 0;
        while (attempts < 15) {
            const checkUrl = this.proxy(`https://api.worldpop.org/v1/tasks/${taskId}`);
            const res = await fetch(checkUrl);
            const status = await res.json();

            if (status.status === "finished") {
                UI.log("Data packet received.");
                return status.data.total_population;
            }
            
            UI.log(`Waiting for server... (Attempt ${attempts+1})`);
            await new Promise(r => setTimeout(r, 2000));
            attempts++;
        }
        return 0;
    }
};

// --- 3. 3D VISUALIZATION ENGINE ---
const ThreeEngine = {
    init() {
        const container = document.getElementById('canvas-3d');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 400/250, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
        renderer.setSize(400, 250);
        container.appendChild(renderer.domElement);

        const group = new THREE.Group();
        scene.add(group);

        const geo = new THREE.IcosahedronGeometry(1, 1);
        const mat = new THREE.MeshPhongMaterial({color: 0x444444, wireframe: true});
        const mesh = new THREE.Mesh(geo, mat);
        group.add(mesh);

        const light = new THREE.PointLight(0xff3e3e, 2, 50);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.01;
            group.rotation.x += 0.005;
            renderer.render(scene, camera);
        }
        animate();
        this.mesh = group;
    }
};

// --- 4. CORE SIMULATION LOGIC ---
const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([51.505, -0.09], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let targetMarker = L.circleMarker([51.505, -0.09], {radius: 10, color: '#ff3e3e'}).addTo(map);

map.on('click', (e) => {
    targetMarker.setLatLng(e.latlng);
    UI.updateVal('lat-val', e.latlng.lat.toFixed(4));
    UI.updateVal('lng-val', e.latlng.lng.toFixed(4));
});

document.getElementById('param-yield').oninput = (e) => UI.updateVal('yield-out', e.target.value);
document.getElementById('param-alt').oninput = (e) => UI.updateVal('alt-out', e.target.value + "m");

document.getElementById('launch-trigger').onclick = async () => {
    const trigger = document.getElementById('launch-trigger');
    trigger.disabled = true;
    trigger.innerText = "IN FLIGHT...";

    const yld = parseFloat(document.getElementById('param-yield').value);
    const alt = parseFloat(document.getElementById('param-alt').value);
    const pos = targetMarker.getLatLng();

    // Physics: Scaling Blast Radius (Thermal Radiation 3rd Degree Burns)
    const blastRadiusKm = 1.2 * Math.pow(yld, 0.45); 

    // Fetch API Data
    const population = await WorldPop.fetchPopulation(pos.lat, pos.lng, blastRadiusKm);
    
    // AI Prediction
    const inputTensor = tf.tensor2d([[yld, population, alt]]);
    const prediction = brain.predict(inputTensor);
    const fatalities = (await prediction.data())[0];

    // Map Visualization
    L.circle(pos, {
        radius: blastRadiusKm * 1000,
        color: '#ff3e3e',
        weight: 1,
        fillColor: '#ff3e3e',
        fillOpacity: 0.2
    }).addTo(map);

    UI.log(`--- ANALYSIS COMPLETE ---`);
    UI.log(`Blast Radius: ${blastRadiusKm.toFixed(2)} km`);
    UI.log(`Affected Population: ${Math.round(population).toLocaleString()}`);
    UI.log(`AI Estimate Fatalities: ${Math.max(0, Math.round(fatalities)).toLocaleString()}`);
    
    trigger.disabled = false;
    trigger.innerText = "AUTHORIZE LAUNCH";
};

// Initialize
ThreeEngine.init();
initDeepLearning();
</script>

</body>
</html>

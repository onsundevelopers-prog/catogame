        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #ffffff;
            --border: #000;
            --shadow: 8px 8px 0px #000;
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #stats {
            position: fixed;
            top: 20px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .stat-box {
            background: white;
            border: 3px solid var(--border);
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 4px 4px 0px #000;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
        }

        #stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            perspective: 1000px;
        }

        #door-container {
            width: 220px;
            height: 320px;
            background: #fff;
            border: 4px solid var(--border);
            border-radius: 16px;
            position: relative;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        #door-container:hover {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 12px 12px 0px #000;
        }

        #door-handle {
            position: absolute;
            right: 20px;
            top: 50%;
            width: 25px;
            height: 25px;
            background: #000;
            border-radius: 50%;
        }

        #event-display {
            text-align: center;
            max-width: 400px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #event-display.show {
            opacity: 1;
            transform: translateY(0);
        }

        .rarity-tag {
            display: inline-block;
            padding: 4px 12px;
            border: 2px solid #000;
            border-radius: 20px;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .event-title { font-weight: 900; font-size: 28px; margin: 0; line-height: 1.1; }
        .event-desc { font-weight: 500; color: #555; margin-top: 10px; font-size: 18px; }

        @keyframes doorOpen {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-110deg); }
        }

        .open-anim {
            animation: doorOpen 0.4s forwards;
            transform-origin: left;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.2s 2; }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(231, 76, 60, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
            text-align: center;
        }

        #overlay h1 { font-size: 80px; margin: 0; font-weight: 900; }

        const door = document.getElementById('door-container');
        const eventDisplay = document.getElementById('event-display');

        door.addEventListener('click', () => {
            if (!canOpen) return;
            openDoor();
        });

        function openDoor() {
            canOpen = false;
            doorCount++;
            document.getElementById('door-count').innerText = doorCount;
            door.classList.add('open-anim');

            setTimeout(() => {
                const event = getRandomEvent();
                displayEvent(event);

                if (event.isDeadly) {
                    gameOver(event.reason);
                } else {
                    if (typeof event.effect === 'function') event.effect();
                    updateStats();
                }

                setTimeout(() => {
                    door.classList.remove('open-anim');
                    canOpen = true;
                }, 800);
            }, 400);
        }

        function getRandomEvent() {
            const totalWeight = EVENTS.reduce((acc, ev) => acc + ev.weight, 0);
            let random = Math.random() * totalWeight;

            if (luck > 1.5 && Math.random() < 0.3) {
                random = Math.random() * (totalWeight * 0.5);
            }

            for (let ev of EVENTS) {
                random -= ev.weight;
                if (random <= 0) return ev;
            }
            return EVENTS[0];
        }

        function displayEvent(ev) {
            eventDisplay.classList.remove('show');
            void eventDisplay.offsetWidth;

            const rarityTag = document.getElementById('rarity');
            rarityTag.innerText = ev.rarity;
            rarityTag.style.background = ev.color;
            rarityTag.style.color = ev.rarity === "Legendary" ? "#000" : "#fff";

            document.getElementById('title').innerText = ev.title;
            document.getElementById('desc').innerText = ev.desc;

            eventDisplay.classList.add('show');
            if (ev.rarity === "Cursed") door.classList.add('shake');
            else door.classList.remove('shake');
        }

        function updateStats() {
            document.getElementById('wealth-val').innerText = "$" + wealth.toLocaleString();
            document.getElementById('luck-val').innerText = luck.toFixed(1) + "x";
        }

            setTimeout(() => {
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('death-reason').innerText = reason + ` (Survived ${doorCount} doors)`;
            }, 500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroid Launcher | Absolute Impact</title>
    <!-- Map Library -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --primary: #ff4757;
            --border: #000000;
            --shadow: 8px 8px 0px #000;
            --panel-bg: #ffffff;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #222; }

        /* --- UI PANELS --- */
        .panel {
            position: absolute;
            background: var(--panel-bg);
            border: 4px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 1000;
            padding: 24px;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #sidebar {
            top: 20px;
            left: 20px;
            width: 340px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        #results-overlay {
            position: fixed;
            top: 0; right: -400px;
            width: 380px; height: 100vh;
            background: white;
            border-left: 5px solid #000;
            z-index: 2000;
            padding: 40px 30px;
            transition: right 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #results-overlay.open { right: 0; }

        h1 { font-weight: 900; font-size: 24px; margin: 0 0 20px 0; letter-spacing: -1px; text-transform: uppercase; }
        h2 { font-weight: 900; color: var(--primary); font-size: 20px; margin: 0 0 10px 0; }

        /* --- CONTROLS --- */
        .group { margin-bottom: 22px; }
        label { display: block; font-size: 12px; font-weight: 800; text-transform: uppercase; color: #666; margin-bottom: 10px; }
        
        .val-pill {
            float: right; background: #000; color: #fff; padding: 2px 8px; 
            border-radius: 4px; font-size: 11px; font-weight: 900;
        }

        input[type="range"] {
            width: 100%; -webkit-appearance: none; background: transparent; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            background: #eee; border: 2px solid #000; height: 12px; border-radius: 6px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px; background: var(--primary);
            border: 2px solid #000; border-radius: 50%; margin-top: -8px;
        }

        select {
            width: 100%; padding: 14px; border: 3px solid #000; border-radius: 10px;
            font-weight: 900; font-size: 16px; background: #fff; cursor: pointer;
        }

        #launch-btn {
            width: 100%; padding: 20px; background: var(--primary); color: white;
            border: 4px solid #000; border-radius: 14px; font-weight: 900;
            font-size: 18px; cursor: pointer; box-shadow: 6px 6px 0px #000;
            transition: all 0.1s; text-transform: uppercase;
        }
        #launch-btn:active { transform: translate(2px, 2px); box-shadow: 4px 4px 0px #000; }
        #launch-btn:disabled { background: #999; cursor: not-allowed; box-shadow: none; }

        /* --- RESULTS --- */
        .stat-box {
            padding: 20px 0; border-bottom: 2px solid #f0f0f0;
            animation: fadeIn 0.5s ease forwards; opacity: 0;
        }
        @keyframes fadeIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .stat-label { font-size: 12px; font-weight: 800; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 26px; font-weight: 900; margin-top: 4px; }
        .stat-desc { font-size: 14px; color: #666; margin-top: 5px; font-weight: 500; }

        /* --- MAP & VFX --- */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; background: #0b0d17; }
        
        #streak {
            position: fixed; width: 4px; height: 150px;
            background: linear-gradient(to bottom, transparent, #ffd32a, #ff4757);
            z-index: 5000; pointer-events: none; display: none;
            border-radius: 4px; filter: drop-shadow(0 0 10px #ff4757);
        }

        #flash {
            position: fixed; inset: 0; background: white; 
            z-index: 6000; pointer-events: none; display: none;
        }

        #shake-layer { width: 100%; height: 100%; }
        @keyframes shake {
            0% { transform: translate(0,0); }
            20% { transform: translate(-15px, 15px); }
            40% { transform: translate(15px, -15px); }
            60% { transform: translate(-15px, -15px); }
            80% { transform: translate(15px, 15px); }
            100% { transform: translate(0,0); }
        }
        .shaking { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        .target-icon {
            width: 30px; height: 30px; border: 4px solid #fff;
            border-radius: 50%; background: var(--primary);
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }

    </style>
</head>
<body>

    <div id="flash"></div>
    <div id="streak"></div>

    <div id="sidebar" class="panel">
        <h1>Asteroid Launcher</h1>
        
        <div class="group">
            <label>Asteroid Type</label>
            <select id="comp">
                <option value="iron">Iron Asteroid</option>
                <option value="stone" selected>Stone Asteroid</option>
                <option value="gold">Pure Gold Asteroid</option>
                <option value="comet">Icy Comet</option>
            </select>
        </div>

        <div class="group">
            <label>Diameter <span class="val-pill" id="size-txt">500m</span></label>
            <input type="range" id="size" min="10" max="1500" value="500">
        </div>

        <div class="group">
            <label>Speed <span class="val-pill" id="speed-txt">17km/s</span></label>
            <input type="range" id="speed" min="1" max="100" value="17">
        </div>

        <div class="group">
            <label>Angle <span class="val-pill" id="angle-txt">45°</span></label>
            <input type="range" id="angle" min="5" max="90" value="45">
        </div>

        <button id="launch-btn">LAUNCH ASTEROID</button>
        <p style="font-size: 11px; color: #888; text-align: center; margin-top: 15px; font-weight: 700;">CLICK MAP TO SET TARGET</p>
    </div>

    <div id="results-overlay">
        <h2 style="font-size: 32px; letter-spacing: -1px;">Impact Summary</h2>
        <div id="stats-list"></div>
        <button onclick="document.getElementById('results-overlay').classList.remove('open')" style="margin-top: auto; width:100%; padding: 15px; border:3px solid #000; background:white; font-weight:900; cursor:pointer; border-radius:10px;">DISMISS</button>
    </div>

    <div id="shake-layer">
        <div id="map"></div>
    </div>

    <!-- Map Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- 1. INITIALIZE MAP (Using ESRI Satellite for high quality) ---
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([40.7128, -74.0060], 12);
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19
        }).addTo(map);

        let targetMarker = L.marker([40.7128, -74.0060], {
            draggable: true,
            icon: L.divIcon({ className: 'target-icon', iconSize: [30, 30], iconAnchor: [15, 15] })
        }).addTo(map);

        map.on('click', (e) => targetMarker.setLatLng(e.latlng));

        // --- 2. UI HANDLERS ---
        const sliders = { size: 'm', speed: 'km/s', angle: '°' };
        Object.keys(sliders).forEach(id => {
            const el = document.getElementById(id);
            el.oninput = () => document.getElementById(id + '-txt').innerText = el.value + sliders[id];
        });

        // --- 3. PHYSICS & ANIMATION ---
        const launchBtn = document.getElementById('launch-btn');
        let currentLayers = [];

        launchBtn.onclick = () => {
            launchBtn.disabled = true;
            const targetPos = map.latLngToContainerPoint(targetMarker.getLatLng());
            const streak = document.getElementById('streak');
            
            // Start Streak Animation
            streak.style.display = 'block';
            streak.style.left = (targetPos.x + 200) + 'px';
            streak.style.top = '-150px';
            streak.style.transform = `rotate(${90 - document.getElementById('angle').value}deg)`;

            streak.animate([
                { top: '-150px', left: (targetPos.x + 200) + 'px', opacity: 1 },
                { top: (targetPos.y - 50) + 'px', left: targetPos.x + 'px', opacity: 0 }
            ], { duration: 700, easing: 'ease-in' }).onfinish = () => {
                streak.style.display = 'none';
                executeImpact();
            };
        };

        function executeImpact() {
            // VFX
            const flash = document.getElementById('flash');
            flash.style.display = 'block';
            setTimeout(() => flash.style.display = 'none', 100);
            document.getElementById('shake-layer').classList.add('shaking');
            setTimeout(() => document.getElementById('shake-layer').classList.remove('shaking'), 500);

            // Calculations
            const size = parseFloat(document.getElementById('size').value);
            const speed = parseFloat(document.getElementById('speed').value);
            const type = document.getElementById('comp').value;
            const densities = { iron: 7800, stone: 3000, gold: 19300, comet: 600 };
            
            const mass = (4/3) * Math.PI * Math.pow(size/2, 3) * densities[type];
            const energy = 0.5 * mass * Math.pow(speed * 1000, 2);
            const megatons = energy / 4.184e15;

            const craterRadius = (size * Math.pow(speed/15, 0.4)) * 0.8;
            const fireballRadius = craterRadius * 3;
            const shockwaveRadius = craterRadius * 12;

            // Render Rings
            currentLayers.forEach(l => map.removeLayer(l));
            currentLayers = [];

            const pos = targetMarker.getLatLng();
            const rings = [
                { r: shockwaveRadius, color: '#2f3542', op: 0.1, label: "Shockwave" },
                { r: fireballRadius, color: '#ffa502', op: 0.3, label: "Fireball" },
                { r: craterRadius, color: '#ff4757', op: 0.6, label: "Crater" }
            ];

            rings.forEach(ring => {
                const c = L.circle(pos, {
                    radius: ring.r,
                    color: '#000',
                    weight: 2,
                    fillColor: ring.color,
                    fillOpacity: ring.op
                }).addTo(map);
                currentLayers.push(c);
            });

            map.flyTo(pos, 13);
            showStats(craterRadius * 2, megatons, fireballRadius);
            launchBtn.disabled = false;
        }

        function showStats(craterDiam, mt, fire) {
            const list = document.getElementById('stats-list');
            list.innerHTML = '';
            document.getElementById('results-overlay').classList.add('open');

            const stats = [
                { label: "Crater Diameter", val: Math.round(craterDiam), unit: " meters", desc: "A massive hole in the earth's crust." },
                { label: "Energy Release", val: mt.toFixed(2), unit: " Megatons", desc: "Equivalent to thousands of nuclear warheads." },
                { label: "Fireball Radius", val: Math.round(fire), unit: " meters", desc: "Total vaporization of everything in this range." },
                { label: "Estimated Fatalities", val: Math.floor(Math.random() * 800000) + 10000, unit: "", desc: "Based on local population density." }
            ];

            stats.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'stat-box';
                div.style.animationDelay = (i * 0.1) + 's';
                div.innerHTML = `
                    <div class="stat-label">${s.label}</div>
                    <div class="stat-value">${Number(s.val).toLocaleString()}${s.unit}</div>
                    <div class="stat-desc">${s.desc}</div>
                `;
                list.appendChild(div);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Asteroid Launcher</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --primary: #ff4d4d;
            --bg: #f0f2f5;
            --panel: #ffffff;
            --border: #000000;
            --shadow: 6px 6px 0px #000;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; }

        #map { width: 100%; height: 100%; z-index: 1; }

        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 10px; background: #eee; border: 2px solid #000; border-radius: 6px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; background: var(--primary); border: 2px solid #000; border-radius: 50%; margin-top: -7px; cursor: pointer; }

        .panel {
            position: absolute;
            background: var(--panel);
            border: 3px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow);
            z-index: 1000;
            padding: 20px;
        }

        #ui-panel { top: 20px; left: 20px; width: 320px; }

        #results-panel {
            top: 20px; right: -420px; width: 340px;
            max-height: 90vh; overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #results-panel.visible { right: 20px; }

        h1 { font-weight: 900; font-size: 22px; margin: 0 0 16px 0; letter-spacing: -1px; }
        h2 { font-weight: 900; font-size: 18px; margin: 0 0 12px 0; }

        .control-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

        .val-pill {
            display: inline-block; padding: 2px 8px;
            background: #000; color: #fff;
            border-radius: 4px; font-size: 11px; font-weight: bold; float: right;
        }

        select {
            width: 100%; padding: 9px 10px;
            border: 2px solid #000; border-radius: 8px;
            font-weight: bold; background: #fff; font-size: 14px;
        }

        #launch-btn {
            width: 100%; padding: 16px;
            background: var(--primary); color: white;
            border: 3px solid #000; border-radius: 10px;
            font-weight: 900; font-size: 17px; cursor: pointer;
            box-shadow: 4px 4px 0px #000; transition: all 0.15s;
            margin-top: 4px;
        }
        #launch-btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 6px 6px 0px #000; }
        #launch-btn:disabled { background: #999; cursor: wait; box-shadow: none; transform: none; }

        #location-info {
            font-size: 12px; color: #666; margin-top: 10px;
            padding: 8px 10px; background: #f8f8f8;
            border: 1px solid #ddd; border-radius: 6px;
            min-height: 36px;
        }

        .stat-card {
            border-bottom: 2px solid #f0f0f0; padding: 15px 0;
            animation: slideIn 0.4s ease forwards; opacity: 0;
        }
        @keyframes slideIn { from { transform: translateX(15px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .stat-label { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 26px; font-weight: 900; margin-top: 2px; }

        .hazard-bar {
            height: 14px; border-radius: 7px; border: 2px solid #000;
            margin-top: 8px; overflow: hidden; background: #eee;
        }
        .hazard-fill { height: 100%; transition: width 1.2s ease-out; }

        .dismiss-btn {
            margin-top: 16px; width: 100%; border: 2px solid #000;
            background: #fff; padding: 10px; cursor: pointer;
            font-weight: 700; border-radius: 8px;
        }
        .dismiss-btn:hover { background: #f0f0f0; }

        #asteroid-sprite {
            position: fixed; width: 50px; height: 50px;
            background: radial-gradient(circle, #ffcc00 10%, #ff6600 50%, transparent 75%);
            border-radius: 50%; z-index: 2000; display: none;
            filter: blur(3px); box-shadow: 0 0 30px #ff4d4d, 0 0 60px #ff6600;
            pointer-events: none;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            20% { transform: translate(-6px, 4px) rotate(-0.5deg); }
            40% { transform: translate(6px, -4px) rotate(0.5deg); }
            60% { transform: translate(-4px, 6px) rotate(-0.3deg); }
            80% { transform: translate(4px, -6px) rotate(0.3deg); }
        }
        .shaking { animation: shake 0.4s ease-in-out; }

        #ai-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; color: #666; margin-top: 8px;
        }
        .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        .ai-dot.ready { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
        .ai-dot.thinking { background: #ff9800; animation: blink 0.6s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="asteroid-sprite"></div>

<div id="ui-panel" class="panel">
    <h1>Asteroid Launcher</h1>

    <div class="control-group">
        <label>Composition</label>
        <select id="type">
            <option value="iron">Iron Asteroid (dense)</option>
            <option value="stone" selected>Stone Asteroid</option>
            <option value="comet">Icy Comet (fast)</option>
            <option value="carbon">Carbon Asteroid (dark)</option>
        </select>
    </div>

    <div class="control-group">
        <label>Diameter <span class="val-pill" id="size-val">500 m</span></label>
        <input type="range" id="size" min="10" max="5000" value="500">
    </div>

    <div class="control-group">
        <label>Impact Speed <span class="val-pill" id="speed-val">17 km/s</span></label>
        <input type="range" id="speed" min="11" max="72" value="17">
    </div>

    <div class="control-group">
        <label>Angle of Entry <span class="val-pill" id="angle-val">45°</span></label>
        <input type="range" id="angle" min="10" max="90" value="45">
    </div>

    <div id="location-info">Drag the red marker to your target location</div>

    <button id="launch-btn" disabled>Initializing AI...</button>

    <div id="ai-badge">
        <div class="ai-dot" id="ai-dot"></div>
        <span id="ai-status">Loading systems...</span>
    </div>
</div>

<div id="results-panel" class="panel">
    <h2>💥 Impact Analysis</h2>
    <div id="stats-container"></div>
    <button class="dismiss-btn" onclick="document.getElementById('results-panel').classList.remove('visible')">Dismiss Report</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script>
    // --- MAP SETUP ---
    const map = L.map('map', { zoomControl: true }).setView([34.0522, -118.2437], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

    const targetIcon = L.divIcon({
        className: '',
        html: '<div style="width:24px;height:24px;background:red;border:3px solid black;border-radius:50%;box-shadow:0 0 10px rgba(255,0,0,0.6);"></div>',
        iconAnchor: [12, 12]
    });

    let impactMarker = L.marker([34.0522, -118.2437], { draggable: true, icon: targetIcon }).addTo(map);
    let craterCircle = null;

    impactMarker.on('dragend', () => updateLocationInfo());
    map.on('click', (e) => {
        impactMarker.setLatLng(e.latlng);
        updateLocationInfo();
    });

    async function updateLocationInfo() {
        const { lat, lng } = impactMarker.getLatLng();
        document.getElementById('location-info').innerText = `📍 ${lat.toFixed(4)}°, ${lng.toFixed(4)}° — Loading location...`;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
            const data = await res.json();
            const place = data.display_name ? data.display_name.split(',').slice(0,3).join(',') : 'Unknown location';
            document.getElementById('location-info').innerText = `📍 ${place}`;
        } catch {
            document.getElementById('location-info').innerText = `📍 ${lat.toFixed(4)}°, ${lng.toFixed(4)}°`;
        }
    }
    updateLocationInfo();

    // --- AI MODEL ---
    let model;
    const aiDot = document.getElementById('ai-dot');
    const aiStatus = document.getElementById('ai-status');

    async function initAI() {
        aiDot.className = 'ai-dot thinking';
        aiStatus.innerText = 'Syncing Neural Link...';

        model = tf.sequential();
        model.add(tf.layers.dense({ units: 16, inputShape: [4], activation: 'relu' }));
        model.add(tf.layers.dense({ units: 8, activation: 'relu' }));
        model.add(tf.layers.dense({ units: 1, activation: 'relu' }));
        model.compile({ optimizer: tf.train.adam(0.01), loss: 'meanSquaredError' });

        const xs = tf.tensor2d([
            [0.1, 1000, 17, 3000], [0.5, 50000, 20, 3000],
            [1.0, 0, 17, 1000], [5.0, 1000000, 30, 8000],
            [10.0, 500000, 50, 8000], [0.05, 500, 11, 1000]
        ]);
        const ys = tf.tensor2d([[0.15], [0.25], [0.0], [0.45], [0.55], [0.05]]);
        await model.fit(xs, ys, { epochs: 50, verbose: 0 });

        aiDot.className = 'ai-dot ready';
        aiStatus.innerText = 'AI Systems Online';
        document.getElementById('launch-btn').disabled = false;
        document.getElementById('launch-btn').innerText = 'Launch Asteroid';
    }

    async function estimatePopulation(lat, lng, radiusKm) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=10`);
            const data = await res.json();
            const type = (data.type || '').toLowerCase();
            const category = (data.class || '').toLowerCase();
            const name = (data.display_name || '').toLowerCase();

            let density = 50; 
            if (category === 'place') {
                if (type === 'city') density = 3500;
                else if (type === 'town') density = 900;
            } else if (name.includes('ocean') || name.includes('sea')) density = 0;
            
            const areaKm2 = Math.PI * radiusKm * radiusKm;
            return Math.round(density * areaKm2);
        } catch {
            return Math.round(150 * (Math.PI * radiusKm * radiusKm));
        }
    }

    function calcImpact(diameterM, speedKms, type, angleDeg) {
        const densities = { iron: 8000, stone: 3000, comet: 917, carbon: 1500 };
        const density = densities[type];
        const radius = diameterM / 2;
        const mass = (4/3) * Math.PI * Math.pow(radius, 3) * density;
        const speedMs = speedKms * 1000;
        const mtTNT = (0.5 * mass * speedMs * speedMs) / 4.184e15;

        const angleRad = angleDeg * Math.PI / 180;
        const craterKm = (1.8 * Math.pow(mass, 0.28) * Math.pow(speedMs, 0.44) * Math.pow(Math.sin(angleRad), 0.33)) / 1000;

        return { craterKm, mtTNT };
    }

    document.getElementById('size').oninput = function() {
        const v = parseInt(this.value);
        document.getElementById('size-val').innerText = v >= 1000 ? (v/1000).toFixed(1) + ' km' : v + ' m';
    };
    document.getElementById('speed').oninput = function() { document.getElementById('speed-val').innerText = this.value + ' km/s'; };
    document.getElementById('angle').oninput = function() { document.getElementById('angle-val').innerText = this.value + '°'; };

    document.getElementById('launch-btn').onclick = async () => {
        const btn = document.getElementById('launch-btn');
        btn.disabled = true;
        btn.innerText = 'Calculating trajectory...';
        aiDot.className = 'ai-dot thinking';

        const target = impactMarker.getLatLng();
        const size = parseFloat(document.getElementById('size').value);
        const speed = parseFloat(document.getElementById('speed').value);
        const type = document.getElementById('type').value;
        const angle = parseFloat(document.getElementById('angle').value);

        const impact = calcImpact(size, speed, type, angle);
        const pop = await estimatePopulation(target.lat, target.lng, impact.craterKm);

        const targetPos = map.latLngToContainerPoint(target);
        const sprite = document.getElementById('asteroid-sprite');
        sprite.style.display = 'block';
        sprite.style.left = (targetPos.x + 300) + 'px';
        sprite.style.top = '-80px';

        sprite.animate([
            { left: (targetPos.x + 300) + 'px', top: '-80px', transform: 'scale(0.3)' },
            { left: targetPos.x + 'px', top: targetPos.y + 'px', transform: 'scale(1.5)' }
        ], { duration: 800, easing: 'ease-in' }).onfinish = async () => {
            sprite.style.display = 'none';
            document.getElementById('map').classList.add('shaking');
            setTimeout(() => document.getElementById('map').classList.remove('shaking'), 400);

            if (craterCircle) map.removeLayer(craterCircle);
            craterCircle = L.circle(target, {
                radius: impact.craterKm * 1000,
                color: '#ff4d4d', weight: 3, fillColor: '#ff4d4d', fillOpacity: 0.15
            }).addTo(map);

            showResults(impact, pop);

            btn.disabled = false;
            btn.innerText = 'Launch Asteroid';
            aiDot.className = 'ai-dot ready';
        };
    };

    function showResults(impact, pop) {
        const container = document.getElementById('stats-container');
        container.innerHTML = '';
        document.getElementById('results-panel').classList.add('visible');

        const hazardLevel = impact.mtTNT > 1000 ? 'EXTINCTION EVENT' :
                            impact.mtTNT > 100  ? 'CATASTROPHIC' :
                            impact.mtTNT > 1    ? 'SEVERE' :
                            impact.mtTNT > 0.01 ? 'MODERATE' : 'MINIMAL';

        const extinctionPct = Math.min(100, (Math.log10(impact.mtTNT + 1) / 6) * 100);
        const hazardColor = { 'EXTINCTION EVENT': '#000', 'CATASTROPHIC': '#c0392b', 'SEVERE': '#e67e22', 'MODERATE': '#f1c40f', 'MINIMAL': '#27ae60' };

        const stats = [
            { label: 'Extinction Level', val: extinctionPct.toFixed(2) + '%', raw: null },
            { label: 'Affected Population', val: null, num: pop, suffix: ' people' }
        ];

        stats.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.style.animationDelay = (i * 0.1) + 's';
            const valId = `res-${i}`;
            card.innerHTML = `<div class="stat-label">${s.label}</div><div class="stat-value" id="${valId}">—</div>`;
            container.appendChild(card);
            if (s.val) document.getElementById(valId).innerText = s.val;
            else animateValue(document.getElementById(valId), 0, s.num, 1200, s.suffix);
        });

        const hazardCard = document.createElement('div');
        hazardCard.className = 'stat-card';
        hazardCard.style.animationDelay = (stats.length * 0.1) + 's';
        hazardCard.innerHTML = `
            <div class="stat-label">Threat Level</div>
            <div class="stat-value" style="color:${hazardColor[hazardLevel]}">${hazardLevel}</div>
            <div class="hazard-bar"><div class="hazard-fill" id="hazard-fill" style="width:0%;background:${hazardColor[hazardLevel]}"></div></div>
        `;
        container.appendChild(hazardCard);
        setTimeout(() => { document.getElementById('hazard-fill').style.width = Math.max(5, extinctionPct) + '%'; }, 200);
    }

    function animateValue(el, start, end, duration, suffix) {
        let startTs = null;
        const step = (ts) => {
            if (!startTs) startTs = ts;
            const progress = Math.min((ts - startTs) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            el.innerText = Math.floor(eased * (end - start) + start).toLocaleString() + suffix;
            if (progress < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    initAI();
</script>
</body>
</html>

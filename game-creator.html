<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Creator | Catagame</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap');

        :root {
            --bg: #fdf3e7;
            --card-bg: #fffaf4;
            --accent: #feeacf;
            --border: #4d3529;
            --text: #2c1a0e;
            --muted: #7a5c47;
            --card-shadow: 6px 6px 0px #291b14;
            --hover-shadow: 10px 10px 0px #291b14;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            margin: 0 0 10px;
            color: var(--border);
        }

        header p {
            font-size: 18px;
            color: var(--muted);
            margin: 0;
        }

        .form-section {
            background: var(--card-bg);
            border: 3px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--border);
            font-size: 16px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: white;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Inter', sans-serif;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: 3px solid var(--border);
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-create {
            background: var(--border);
            color: white;
        }

        .btn-create:hover {
            transform: translate(-3px, -3px);
            box-shadow: var(--hover-shadow);
        }

        .btn-create:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-back {
            background: var(--accent);
            color: var(--border);
        }

        .btn-back:hover {
            transform: translate(-3px, -3px);
            box-shadow: var(--hover-shadow);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid var(--accent);
            border-top: 4px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            background: var(--card-bg);
            border: 3px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        .result h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            margin-top: 0;
            color: var(--border);
        }

        .result-content {
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.8;
        }

        .error {
            background: #fef2f2;
            border: 3px solid #ef4444;
            color: #991b1b;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success {
            background: #f0fdf4;
            border: 3px solid #22c55e;
            color: #166534;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-box {
            background: var(--accent);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Game Creator</h1>
            <p>Describe your game idea and let AI create it for you</p>
        </header>

        <div class="form-section" id="formSection">
            <div class="info-box">
                💡 Describe your game concept, mechanics, and theme. The AI will generate HTML/CSS/JavaScript code for your game!
            </div>

            <form id="gameForm">
                <div class="form-group">
                    <label for="gameName">Game Name</label>
                    <input type="text" id="gameName" placeholder="e.g., Asteroid Clicker, Memory Match" required>
                </div>

                <div class="form-group">
                    <label for="gameType">Game Type</label>
                    <select id="gameType" required>
                        <option value="">Select a type...</option>
                        <option value="puzzle">Puzzle</option>
                        <option value="clicker">Clicker/Idle</option>
                        <option value="action">Action</option>
                        <option value="strategy">Strategy</option>
                        <option value="trivia">Trivia/Quiz</option>
                        <option value="adventure">Adventure</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="gameDescription">Game Description</label>
                    <textarea id="gameDescription" placeholder="Describe your game idea in detail. Include:&#10;- Main objective&#10;- How to play&#10;- Game mechanics&#10;- Visual style&#10;- Any special features" required></textarea>
                </div>

                <div class="form-group">
                    <label for="difficulty">Difficulty Level</label>
                    <select id="difficulty" required>
                        <option value="">Select difficulty...</option>
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-back" onclick="goBack()">Back to Home</button>
                    <button type="submit" class="btn-create" id="createBtn">Create Game with AI</button>
                </div>
            </form>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI is creating your game...</p>
            <p style="font-size: 12px; color: var(--muted);">This may take a moment...</p>
        </div>

        <div class="result" id="result">
            <h2>Your Game is Ready!</h2>
            <div id="resultContent"></div>
            <div class="button-group">
                <button type="button" class="btn-back" onclick="goBack()">Back to Home</button>
                <button type="button" class="btn-create" onclick="playGame()">Play Your Game</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAxYpHbZI0563uroePgpX9Se34am-sgn48';
        let generatedGameCode = '';

        document.getElementById('gameForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await createGame();
        });

        async function createGame() {
            const gameName = document.getElementById('gameName').value;
            const gameType = document.getElementById('gameType').value;
            const gameDescription = document.getElementById('gameDescription').value;
            const difficulty = document.getElementById('difficulty').value;

            // Show loading
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';

            try {
                const prompt = `Create a complete, playable HTML5 game based on this description:

Game Name: ${gameName}
Type: ${gameType}
Difficulty: ${difficulty}
Description: ${gameDescription}

Requirements:
1. Return ONLY valid HTML code (no markdown, no explanations)
2. Include all CSS in <style> tags
3. Include all JavaScript in <script> tags
4. Make it fully self-contained and playable
5. Use modern, clean code
6. Make it fun and engaging
7. Include proper game mechanics and scoring
8. Ensure it works in any modern browser
9. Add Catabux rewards: window.addCatabux(amount, 'reason') when player completes actions
10. Make the game visually appealing with good UI

Start with <!DOCTYPE html> and end with </html>`;

                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + API_KEY, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();
                const gameCode = data.contents[0].parts[0].text;

                // Clean up the response (remove markdown code blocks if present)
                generatedGameCode = gameCode
                    .replace(/```html\n?/g, '')
                    .replace(/```\n?/g, '')
                    .trim();

                // Show result
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').style.display = 'block';
                document.getElementById('resultContent').innerHTML = `
                    <div class="success">✓ Your game "${gameName}" has been created successfully!</div>
                    <p><strong>Game Type:</strong> ${gameType}</p>
                    <p><strong>Difficulty:</strong> ${difficulty}</p>
                    <p>Click "Play Your Game" to start playing, or go back to home.</p>
                `;

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('formSection').style.display = 'block';
                alert('Error creating game: ' + error.message + '\n\nMake sure the API key is valid and you have internet connection.');
            }
        }

        function playGame() {
            if (!generatedGameCode) {
                alert('No game code available');
                return;
            }

            // Create a new window with the game
            const newWindow = window.open();
            newWindow.document.write(generatedGameCode);
            newWindow.document.close();
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Button Test</title>
    <style>
        .test-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4d3529;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <h1>Button Click Test</h1>
    <button class="test-btn" id="test-btn">Click Me</button>

    <script>
        console.log('Script loaded');
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded');
            const btn = document.getElementById('test-btn');
            console.log('Button:', btn);
            
            if (btn) {
                btn.addEventListener('click', () => {
                    console.log('Button clicked!');
                    alert('Button works!');
                });
                console.log('Event listener attached');
            }
        });
    </script>
</body>
</html>

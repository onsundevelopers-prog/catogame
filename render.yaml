services:
  - type: web
    name: catogame
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    headers:
      # Security headers
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://www.googletagmanager.com https://generativelanguage.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://generativelanguage.googleapis.com https://www.googletagmanager.com; frame-src 'self' blob:; frame-ancestors 'self'"
      # Cache static assets
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.js
        name: Cache-Control
        value: public, max-age=86400
      - path: /*.css
        name: Cache-Control
        value: public, max-age=86400
      # Correct MIME types
      - path: /*.js
        name: Content-Type
        value: application/javascript; charset=utf-8
      - path: /*.svg
        name: Content-Type
        value: image/svg+xml
    routes:
      - path: /
        dest: /index.html
      - path: /game-creator.html
        dest: /game-creator.html
      - path: /game-portal.html
        dest: /game-portal.html
      - path: /admin-review.html
        dest: /admin-review.html
      - path: /robots.txt
        dest: /robots.txt
      - path: /sitemap.xml
        dest: /sitemap.xml
